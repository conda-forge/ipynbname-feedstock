{% set name = "ipynbname" %}
{% set version = "2025.8.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: dcc8367c64c4a9f0baa6acea3e509fd6696bf5d81c9abceb386e2ad6efcac935

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python >=3.4
    - pip
  run:
    - python >=3.4
    - ipykernel

test:
  imports:
    - ipynbname

about:
  home: https://github.com/msm1089/ipynbname
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  summary: Simple utility that retrieves current Jupyter notebook filename or path, when run from Jupyter notebook
  dev_url: https://github.com/msm1089/ipynbname

extra:
  recipe-maintainers:
    - DamienIrving
    - msm1089
